case_common:
  allure_epic: workspace
  allure_feature: 用户登录模块
  allure_story: 登录接口
  case_markers:
    - workspace
    - smoke
    - login

case_info:
-
  id: login_01
  title: 账号密码登录
  run: True
  severity: normal
  url: /api/crm/v4/user/login
  method: POST
  headers:
    Content-Type: application/json;charset=utf-8;
  cookies:
  request_type: json
  payload:
    username: admin
    password: '"123123"'
    appPlatform: work-space
    appVersion: 0.1.1
  files:
  wait_seconds: 2
  assert_response:
    status_code: 200
    assert_token_exist:
      message: 断言响应中data.token字段等于预期值
      expect_value: "admin"
      assert_type: "=="
      type_jsonpath: "$.data.user.username"
    assert_openid:
      message: 断言响应中data.user.openid等于预期值
      expect_value: "o3oc760tfUizHMk03BlecWSKkBW0"
      assert_type: "=="
      type_jsonpath: "$.data.user.openid"
  assert_sql:
  extract:
    response:
      type_jsonpath:
        token: $.data.token
        openid: $.data.user.openid
