name: API Autotest CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'core/**'
      - 'utils/**'
      - 'config/**'
      - 'testcases/**'
      - 'interfaces/**'
      - 'requirements.txt'
      - 'run.py'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
      markers:
        description: 'Run specific test markers (comma-separated)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  CI: true

jobs:
  # ========================================
  # 代码质量检查
  # ========================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8

      - name: Run Ruff Linter
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Run Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  # ========================================
  # 安全检查
  # ========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit Security Linter
        run: bandit -r core/ utils/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: safety check -r requirements.txt --full-report || true
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 7

  # ========================================
  # 测试环境测试
  # ========================================
  test-env:
    name: Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security]
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'test') ||
      (github.event_name == 'pull_request')
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_TO_LIST: ${{ secrets.EMAIL_TO_LIST }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      TEST_DB_HOST: ${{ secrets.TEST_DB_HOST }}
      TEST_DB_PORT: ${{ secrets.TEST_DB_PORT }}
      TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
      TEST_DB_PWD: ${{ secrets.TEST_DB_PWD }}
      TEST_DB_DATABASE: ${{ secrets.TEST_DB_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare .env from secrets
        run: |
          cat > .env << EOF
          EMAIL_USER="${EMAIL_USER}"
          EMAIL_PASSWORD="${EMAIL_PASSWORD}"
          EMAIL_HOST="${EMAIL_HOST}"
          EMAIL_TO_LIST="${EMAIL_TO_LIST}"
          DINGTALK_WEBHOOK="${DINGTALK_WEBHOOK}"
          DINGTALK_SECRET="${DINGTALK_SECRET}"
          WECHAT_WEBHOOK="${WECHAT_WEBHOOK}"
          TEST_USERNAME="${TEST_USERNAME}"
          TEST_PASSWORD="${TEST_PASSWORD}"
          TEST_DB_HOST="${TEST_DB_HOST}"
          TEST_DB_PORT="${TEST_DB_PORT}"
          TEST_DB_USER="${TEST_DB_USER}"
          TEST_DB_PWD="${TEST_DB_PWD}"
          TEST_DB_DATABASE="${TEST_DB_DATABASE}"
          EOF

      - name: Generate Test Cases
        run: python -c "from core.case_generate_utils.case_fun_generate import generate_cases_for_projects; generate_cases_for_projects()"

      - name: Run API Tests
        run: |
          if [ -n "${{ github.event.inputs.markers }}" ]; then
            python run.py -env test -report yes -m "${{ github.event.inputs.markers }}"
          else
            python run.py -env test -report yes
          fi
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: outputs/report/allure_results
          allure_report: outputs/report/allure_html
          keep_reports: 20

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: |
            outputs/report/
            outputs/log/
          retention-days: 14

      - name: Upload Test Results Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: outputs/report/test_result.txt
          retention-days: 30

      - name: Comment PR with Test Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('outputs/report/test_result.txt')) {
              const results = fs.readFileSync('outputs/report/test_result.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 📊 Test Results\n\n```\n' + results + '\n```'
              });
            }

      - name: Notify on Success
        if: success()
        run: echo "::notice::Tests passed in Test environment"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Tests failed in Test environment"
          echo "::error file=run.py::Test execution failed"

  # ========================================
  # 生产环境测试
  # ========================================
  prod-env:
    name: Production Environment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security, test-env]
    if: |
      github.ref == 'refs/heads/master' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment: production
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_TO_LIST: ${{ secrets.EMAIL_TO_LIST }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
      PROD_USERNAME: ${{ secrets.PROD_USERNAME }}
      PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}
      PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
      PROD_DB_PORT: ${{ secrets.PROD_DB_PORT }}
      PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
      PROD_DB_PWD: ${{ secrets.PROD_DB_PWD }}
      PROD_DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare .env from secrets
        run: |
          cat > .env << EOF
          EMAIL_USER="${EMAIL_USER}"
          EMAIL_PASSWORD="${EMAIL_PASSWORD}"
          EMAIL_HOST="${EMAIL_HOST}"
          EMAIL_TO_LIST="${EMAIL_TO_LIST}"
          DINGTALK_WEBHOOK="${DINGTALK_WEBHOOK}"
          DINGTALK_SECRET="${DINGTALK_SECRET}"
          WECHAT_WEBHOOK="${WECHAT_WEBHOOK}"
          PROD_USERNAME="${PROD_USERNAME}"
          PROD_PASSWORD="${PROD_PASSWORD}"
          PROD_DB_HOST="${PROD_DB_HOST}"
          PROD_DB_PORT="${PROD_DB_PORT}"
          PROD_DB_USER="${PROD_DB_USER}"
          PROD_DB_PWD="${PROD_DB_PWD}"
          PROD_DB_DATABASE="${PROD_DB_DATABASE}"
          EOF

      - name: Generate Test Cases
        run: python -c "from core.case_generate_utils.case_fun_generate import generate_cases_for_projects; generate_cases_for_projects()"

      - name: Run API Tests
        run: python run.py -env prod -report yes
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: outputs/report/allure_results
          allure_report: outputs/report/allure_html
          keep_reports: 30

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-report-${{ github.run_number }}
          path: |
            outputs/report/
            outputs/log/
          retention-days: 30

      - name: Notify on Success
        if: success()
        run: echo "::notice::Tests passed in Production environment"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Tests failed in Production environment"
          echo "::error file=run.py::Production test execution failed"

  # ========================================
  # 清理旧报告
  # ========================================
  cleanup:
    name: Cleanup Old Reports
    runs-on: ubuntu-latest
    if: always()
    needs: [test-env, prod-env]
    steps:
      - name: Delete old artifacts
        uses: c-hive/gha-delete-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 5