name: API Autotest CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # 代码质量检查
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.git,__pycache__,outputs,lib,.pytest_cache || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.git,__pycache__,outputs,lib,.pytest_cache || true

  # 单元测试
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare environment
        run: |
          touch .env
          mkdir -p outputs/report/allure_results
          mkdir -p outputs/log

      - name: Run CI example tests
        run: |
          pytest testcases/test_manual_case/test_ci_example.py \
            -v \
            -s \
            --tb=short \
            --cache-clear \
            -m ci \
            --alluredir=outputs/report/allure_results \
            --clean-alluredir || true

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: outputs/report/allure_results/
          retention-days: 7
          if-no-files-found: warn

  # 集成测试
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-test
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare environment
        run: |
          touch .env
          mkdir -p outputs/report/allure_results
          mkdir -p outputs/log
          mkdir -p outputs/report/failure_snapshots
          mkdir -p testcases/test_auto_case/yaml_case
          mkdir -p testcases/test_auto_case/excel_case

      - name: Verify imports
        run: |
          python -c "import pytest; print('pytest: OK')"
          python -c "import allure; print('allure: OK')"
          python -c "import requests; print('requests: OK')"
          python -c "import yaml; print('yaml: OK')"
          python -c "from config.settings import BASE_DIR; print('BASE_DIR: OK')"

      - name: Generate test cases
        run: python -c "from core.case_generate_utils.case_fun_generate import generate_cases_for_projects; generate_cases_for_projects()" || echo "No cases generated"

      - name: Run integration tests
        run: |
          pytest testcases/ \
            -v \
            -s \
            --tb=short \
            --cache-clear \
            --maxfail=100 \
            --alluredir=outputs/report/allure_results \
            -p no:warnings || true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "outputs/report/test_result.txt" ]; then
            cat outputs/report/test_result.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "Test execution completed. Check artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: outputs/
          retention-days: 7
          if-no-files-found: warn

  # 最终状态报告
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          ls -la artifacts/ || echo "No artifacts found"

      - name: Create final summary
        run: |
          echo "## CI Pipeline Final Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test artifacts have been uploaded and are available for download." >> $GITHUB_STEP_SUMMARY